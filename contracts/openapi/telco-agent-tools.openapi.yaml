openapi: 3.0.3
info:
  title: Telco Agent Tools API
  version: 1.0.0
  description: APIM-governed telco operations for the MI agent and MCP clients.
servers:
  - url: /telco-agent-tools/v1
x-telco-health-path: /health
x-telco-health-method: GET
x-telco-api-product: Telco AI Service Care Pack
paths:
  /health:
    get:
      operationId: getAgentToolsHealth
      security: []
      responses: {'200': {description: Healthy}}
  /subscribers/{subscriberId}/status:
    get:
      operationId: retrieveSubscriberServiceStatus
      security: [{OAuth2: [telco_subscriber_status]}]
      parameters:
        - {$ref: '#/components/parameters/CorrelationId'}
        - {$ref: '#/components/parameters/PartnerId'}
        - {name: subscriberId, in: path, required: true, schema: {type: string}}
      responses:
        '200': {description: Normalized subscriber status}
        '503': {$ref: '#/components/responses/Problem'}
  /outages/{outageId}:
    get:
      operationId: inspectOutage
      security: [{OAuth2: [telco_outage_read]}]
      parameters:
        - {$ref: '#/components/parameters/CorrelationId'}
        - {$ref: '#/components/parameters/PartnerId'}
        - {name: outageId, in: path, required: true, schema: {type: string}}
      responses:
        '200': {description: Outage details}
        '404': {$ref: '#/components/responses/Problem'}
  /qod-sessions:
    post:
      operationId: requestQualityOnDemandSession
      security: [{OAuth2: [telco_qod_request]}]
      parameters:
        - {$ref: '#/components/parameters/CorrelationId'}
        - {$ref: '#/components/parameters/PartnerId'}
        - {$ref: '#/components/parameters/IdempotencyKey'}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subscriberId, durationSeconds]
              properties:
                subscriberId: {type: string}
                durationSeconds: {type: integer, minimum: 60, maximum: 3600}
                profile: {type: string, enum: [LOW_LATENCY, HIGH_THROUGHPUT]}
      responses:
        '201': {description: QoD request accepted}
        '400': {$ref: '#/components/responses/Problem'}
  /tickets:
    post:
      operationId: openServiceTicket
      security: [{OAuth2: [telco_ticket_create]}]
      parameters:
        - {$ref: '#/components/parameters/CorrelationId'}
        - {$ref: '#/components/parameters/PartnerId'}
        - {$ref: '#/components/parameters/IdempotencyKey'}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subscriberId, summary]
              properties:
                subscriberId: {type: string}
                summary: {type: string, minLength: 5, maxLength: 500}
                severity: {type: string, enum: [LOW, MEDIUM, HIGH, CRITICAL]}
      responses:
        '201': {description: Ticket opened}
        '400': {$ref: '#/components/responses/Problem'}
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://localhost:9443/oauth2/token
          scopes:
            telco_subscriber_status: Read subscriber status
            telco_outage_read: Inspect outages
            telco_qod_request: Request QoD
            telco_ticket_create: Open tickets
  parameters:
    CorrelationId: {name: X-Correlation-ID, in: header, required: false, schema: {type: string}}
    PartnerId: {name: X-Partner-Id, in: header, required: true, schema: {type: string}}
    IdempotencyKey: {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
  responses:
    Problem:
      description: Normalized problem
      content:
        application/problem+json:
          schema: {type: object}
