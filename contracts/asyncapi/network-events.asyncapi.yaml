asyncapi: 3.0.0
info:
  title: NetworkEventsStreamAPI
  version: 1.0.0
  description: Server-Sent Events stream for regional telco network events.
servers:
  production:
    host: telco-backend:8081
    protocol: http
channels:
  networkEvents:
    address: /events/network-events
    messages:
      NetworkEvent:
        $ref: '#/components/messages/NetworkEvent'
operations:
  receiveNetworkEvents:
    action: receive
    channel:
      $ref: '#/channels/networkEvents'
    messages:
      - $ref: '#/channels/networkEvents/messages/NetworkEvent'
x-telco-owner: Network Operations
x-telco-country-scope:
  - BR
  - MX
  - CL
x-telco-event-classification: OPERATIONAL
x-telco-event-retention: 7
x-telco-monetization-model: EVENT_STREAM
components:
  messages:
    NetworkEvent:
      name: NetworkEvent
      title: Network event
      contentType: application/json
      payload:
        type: object
        required:
          - eventId
          - eventType
          - severity
          - region
          - timestamp
        properties:
          eventId:
            type: string
          eventType:
            type: string
          severity:
            type: string
            enum:
              - INFO
              - WARNING
              - CRITICAL
          region:
            type: string
          timestamp:
            type: string
            format: date-time
