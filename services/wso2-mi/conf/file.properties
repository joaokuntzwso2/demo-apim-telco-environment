# Runtime defaults for ${configs.*}. Environment variables with the same names
# take precedence, so Docker/Kubernetes can change these without rebuilding.
crm_base_url=http://subscriber-crm:8080
sim_swap_base_url=http://sim-swap-service:8080
device_location_base_url=http://device-location-service:8080
oss_base_url=http://oss-network-service:8080
crm_legacy_key=crm-demo-key
oss_legacy_key=oss-demo-key
backend_timeout_ms=1500
backend_suspend_initial_ms=5000
backend_suspend_max_ms=30000
runtime_policy_kafka_url=http://telco-backend:8081/api/v1/kafka/topics/telco.runtime.policy.alerts/events
# BEGIN TELCO AI SETTINGS
# Telco AI demo settings appended to conf/file.properties by the installer.
ai_partner_daily_token_quota=$env{AI_PARTNER_DAILY_TOKEN_QUOTA}
ai_standard_input_usd_per_1m=$env{AI_STANDARD_INPUT_USD_PER_1M}
ai_standard_output_usd_per_1m=$env{AI_STANDARD_OUTPUT_USD_PER_1M}
ai_advanced_input_usd_per_1m=$env{AI_ADVANCED_INPUT_USD_PER_1M}
ai_advanced_output_usd_per_1m=$env{AI_ADVANCED_OUTPUT_USD_PER_1M}
# END TELCO AI SETTINGS
