name: demo-apim-telco-environment
services:
  apim-bootstrapper:
    build:
      context: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment
      dockerfile: services/apim-bootstrapper/Dockerfile
    container_name: telco-apim-bootstrapper
    depends_on:
      commercial-meter-store-primary:
        condition: service_healthy
        required: true
      commercial-meter-store-secondary:
        condition: service_healthy
        required: true
      opa:
        condition: service_healthy
        required: true
      opa-dr:
        condition: service_healthy
        required: true
      telco-backend:
        condition: service_started
        required: true
      telco-observability:
        condition: service_healthy
        required: true
      wso2-apim:
        condition: service_healthy
        required: true
      wso2-mi:
        condition: service_healthy
        required: true
    environment:
      APIM_ENV: am47
      APIM_PASSWORD: admin
      APIM_PORTAL_STATE_FILE: /workspace/state/runtime.json
      APIM_USERNAME: admin
      CENTRAL_POLICY_CATALOG_FILE: /workspace/artifacts/apim-admin/central-policy-catalog.json
      CENTRAL_POLICY_FAIL_ON_DENY: "true"
      CENTRAL_POLICY_MI_URL: http://wso2-mi:8290/internal/central-policy/v1
      CENTRAL_POLICY_OPA_URL: http://opa:8181/v1/data/telco/central_policy/decision
      OAUTH_BUSINESS_CONTROLS_STATE_FILE: /workspace/state/oauth-business-controls.json
      OPA_ENABLED: "true"
      OPA_FAIL_ON_DENY: "false"
      OPA_URL: http://opa:8181
      PORTAL_APP_NAME: Regional Portal
      TELCO_BACKEND_URL: http://telco-backend:8081
      WSO2_APIM_GATEWAY_URL: https://wso2-apim:8243
      WSO2_APIM_TOKEN_URL: https://wso2-apim:9443/oauth2/token
      WSO2_APIM_URL: https://wso2-apim:9443
      WSO2_MI_URL: http://wso2-mi:8290
    networks:
      default: null
    restart: "no"
    volumes:
      - type: volume
        source: apim-portal-state
        target: /workspace/state
        volume: {}
  apim-correlation-exporter:
    build:
      context: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment/observability/apim-correlation-exporter
      dockerfile: Dockerfile
    container_name: telco-apim-correlation-exporter
    depends_on:
      telco-observability:
        condition: service_healthy
        required: true
      wso2-apim:
        condition: service_started
        required: true
    environment:
      CORRELATION_LOG: /var/log/wso2/correlation.log
      TELEMETRY_URL: http://telco-observability:8088/v1/events
    networks:
      default: null
    ports:
      - mode: ingress
        target: 9470
        published: "9470"
        protocol: tcp
    volumes:
      - type: volume
        source: apim-observability-logs
        target: /var/log/wso2
        read_only: true
        volume: {}
  commercial-meter-store-primary:
    build:
      context: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment/services/commercial-meter-store
      dockerfile: Dockerfile
    container_name: telco-commercial-meter-primary
    environment:
      MAX_EVENTS: "25000"
      PORT: "8086"
      STATE_FILE: /data/commercial-meter-state.json
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://127.0.0.1:8086/health
      timeout: 3s
      interval: 10s
      retries: 20
      start_period: 5s
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8086
        published: "18086"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: volume
        source: commercial-meter-data
        target: /data
        volume: {}
  commercial-meter-store-secondary:
    build:
      context: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment/services/commercial-meter-store
      dockerfile: Dockerfile
    container_name: telco-commercial-meter-secondary
    environment:
      MAX_EVENTS: "25000"
      PORT: "8086"
      STATE_FILE: /data/commercial-meter-state.json
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://127.0.0.1:8086/health
      timeout: 3s
      interval: 10s
      retries: 20
      start_period: 5s
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8086
        published: "18087"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: volume
        source: commercial-meter-data
        target: /data
        volume: {}
  demo-portal:
    build:
      context: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment
      dockerfile: services/demo-portal/Dockerfile
    container_name: telco-demo-portal
    depends_on:
      apim-bootstrapper:
        condition: service_started
        required: true
      telco-backend:
        condition: service_started
        required: true
    environment:
      APIM_PORTAL_STATE_FILE: /workspace/apim-portal-state/runtime.json
      PORT: "8080"
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8080
        published: "8080"
        protocol: tcp
    volumes:
      - type: volume
        source: apim-portal-state
        target: /workspace/apim-portal-state
        volume: {}
  device-location-service:
    container_name: telco-device-location-service
    environment:
      PORT: "8080"
      SERVICE_KIND: device-location
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - const http=require('http');const r=http.get('http://127.0.0.1:8080/health',res=>{res.resume();process.exit(res.statusCode===200?0:1)});r.on('error',()=>process.exit(1));r.setTimeout(2000,()=>{r.destroy();process.exit(1)})
      timeout: 3s
      interval: 10s
      retries: 20
      start_period: 5s
    image: local/telco-mi-demo-backend:1.0.0
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8080
        published: "18083"
        protocol: tcp
  fluent-bit:
    container_name: telco-fluent-bit
    depends_on:
      loki:
        condition: service_started
        required: true
    image: fluent/fluent-bit:4.0.4
    networks:
      default: null
    volumes:
      - type: bind
        source: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment/observability/fluent-bit/fluent-bit.conf
        target: /fluent-bit/etc/fluent-bit.conf
        read_only: true
        bind: {}
      - type: bind
        source: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment/observability/fluent-bit/parsers.conf
        target: /fluent-bit/etc/parsers.conf
        read_only: true
        bind: {}
      - type: volume
        source: telco-observability-data
        target: /logs/telemetry
        read_only: true
        volume: {}
      - type: volume
        source: apim-observability-logs
        target: /logs/apim
        read_only: true
        volume: {}
      - type: volume
        source: mi-observability-logs
        target: /logs/mi
        read_only: true
        volume: {}
  grafana:
    container_name: telco-grafana
    depends_on:
      loki:
        condition: service_started
        required: true
      prometheus:
        condition: service_started
        required: true
      tempo:
        condition: service_started
        required: true
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_DEFAULT_THEME: light
    image: grafana/grafana:11.5.2
    networks:
      default: null
    ports:
      - mode: ingress
        target: 3000
        published: "3000"
        protocol: tcp
    volumes:
      - type: volume
        source: grafana-data
        target: /var/lib/grafana
        volume: {}
      - type: bind
        source: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment/observability/grafana/provisioning
        target: /etc/grafana/provisioning
        read_only: true
        bind: {}
      - type: bind
        source: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment/observability/grafana/dashboards
        target: /var/lib/grafana/dashboards
        read_only: true
        bind: {}
  kafka-exporter:
    command:
      - --kafka.server=redpanda:9092
      - --group.filter=.*
      - --topic.filter=.*
    container_name: telco-kafka-exporter
    depends_on:
      redpanda:
        condition: service_started
        required: true
    image: danielqsj/kafka-exporter:v1.8.0
    networks:
      default: null
    ports:
      - mode: ingress
        target: 9308
        published: "9308"
        protocol: tcp
  legacy-billing-dr:
    container_name: telco-legacy-billing-dr
    depends_on:
      legacy-billing-primary:
        condition: service_healthy
        required: true
    environment:
      BACKEND_NODE: DR
      DEMO_ADMIN_KEY: demo-admin-key
      PORT: "8080"
      PUBLIC_SERVICE_URL: http://legacy-billing-dr:8080/LegacyBillingAdjustmentService
      WSSE_PASSWORD: change-me-demo-only
      WSSE_USERNAME: mi-modernization
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:8080/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      timeout: 5s
      interval: 10s
      retries: 20
      start_period: 5s
    image: local/telco-legacy-billing-soap:1.0.0
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8080
        published: "18092"
        protocol: tcp
  legacy-billing-primary:
    build:
      context: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment/services/legacy-soap-billing
      dockerfile: Dockerfile
    container_name: telco-legacy-billing-primary
    environment:
      BACKEND_NODE: PRIMARY
      DEMO_ADMIN_KEY: demo-admin-key
      PORT: "8080"
      PUBLIC_SERVICE_URL: http://legacy-billing-primary:8080/LegacyBillingAdjustmentService
      WSSE_PASSWORD: change-me-demo-only
      WSSE_USERNAME: mi-modernization
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:8080/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      timeout: 5s
      interval: 10s
      retries: 20
      start_period: 5s
    image: local/telco-legacy-billing-soap:1.0.0
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8080
        published: "18091"
        protocol: tcp
  loki:
    command:
      - -config.file=/etc/loki/loki.yaml
    container_name: telco-loki
    image: grafana/loki:3.4.2
    networks:
      default: null
    ports:
      - mode: ingress
        target: 3100
        published: "3100"
        protocol: tcp
    volumes:
      - type: bind
        source: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment/observability/loki/loki.yaml
        target: /etc/loki/loki.yaml
        read_only: true
        bind: {}
      - type: volume
        source: loki-data
        target: /loki
        volume: {}
  opa:
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-level=info
      - /policies
    container_name: telco-opa
    healthcheck:
      test:
        - CMD
        - /opa
        - eval
        - --fail
        - --format=discard
        - --data
        - /policies
        - data.telco.central_policy.health
      timeout: 5s
      interval: 10s
      retries: 20
      start_period: 5s
    image: openpolicyagent/opa:latest
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8181
        published: "8181"
        protocol: tcp
    volumes:
      - type: bind
        source: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment/artifacts/opa
        target: /policies
        read_only: true
        bind: {}
  opa-dr:
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - /policies
    container_name: telco-opa-dr
    healthcheck:
      test:
        - CMD
        - /opa
        - eval
        - --fail
        - --format=discard
        - --data
        - /policies
        - data.telco.central_policy.health
      timeout: 5s
      interval: 10s
      retries: 20
      start_period: 5s
    image: openpolicyagent/opa:latest
    networks:
      default: null
    restart: unless-stopped
    volumes:
      - type: bind
        source: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment/artifacts/opa
        target: /policies
        read_only: true
        bind: {}
  oss-network-service:
    container_name: telco-oss-network-service
    environment:
      OSS_LEGACY_KEY: oss-demo-key
      PORT: "8080"
      SERVICE_KIND: oss
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - const http=require('http');const r=http.get('http://127.0.0.1:8080/health',res=>{res.resume();process.exit(res.statusCode===200?0:1)});r.on('error',()=>process.exit(1));r.setTimeout(2000,()=>{r.destroy();process.exit(1)})
      timeout: 3s
      interval: 10s
      retries: 20
      start_period: 5s
    image: local/telco-mi-demo-backend:1.0.0
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8080
        published: "18084"
        protocol: tcp
  otel-collector:
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    container_name: telco-otel-collector
    depends_on:
      tempo:
        condition: service_started
        required: true
    image: otel/opentelemetry-collector-contrib:0.121.0
    networks:
      default: null
    ports:
      - mode: ingress
        target: 4317
        published: "4317"
        protocol: tcp
      - mode: ingress
        target: 4318
        published: "4318"
        protocol: tcp
      - mode: ingress
        target: 8888
        published: "8888"
        protocol: tcp
    volumes:
      - type: bind
        source: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment/observability/otel-collector/config.yaml
        target: /etc/otelcol-contrib/config.yaml
        read_only: true
        bind: {}
  pipeline-portal:
    build:
      context: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment
      dockerfile: services/pipeline-portal/Dockerfile
    container_name: telco-pipeline-portal
    depends_on:
      telco-backend:
        condition: service_started
        required: true
      wso2-apim:
        condition: service_started
        required: true
    environment:
      APIM_ENV: am47
      APIM_INSECURE_TLS: "true"
      APIM_MODE: real
      APIM_PASSWORD: admin
      APIM_USERNAME: admin
      PORT: "8090"
      WSO2_APIM_URL: https://wso2-apim:9443
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8090
        published: "8090"
        protocol: tcp
    volumes:
      - type: volume
        source: pipeline-state
        target: /workspace/state
        volume: {}
  prometheus:
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=24h
      - --web.enable-lifecycle
    container_name: telco-prometheus
    image: prom/prometheus:v3.2.1
    networks:
      default: null
    ports:
      - mode: ingress
        target: 9090
        published: "9090"
        protocol: tcp
    volumes:
      - type: bind
        source: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment/observability/prometheus/prometheus.yml
        target: /etc/prometheus/prometheus.yml
        read_only: true
        bind: {}
      - type: volume
        source: prometheus-data
        target: /prometheus
        volume: {}
  redpanda:
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
    container_name: telco-redpanda
    image: redpandadata/redpanda:latest
    networks:
      default: null
    ports:
      - mode: ingress
        target: 19092
        published: "19092"
        protocol: tcp
      - mode: ingress
        target: 9644
        published: "9644"
        protocol: tcp
  sim-swap-service:
    container_name: telco-sim-swap-service
    environment:
      PORT: "8080"
      SERVICE_KIND: sim-swap
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - const http=require('http');const r=http.get('http://127.0.0.1:8080/health',res=>{res.resume();process.exit(res.statusCode===200?0:1)});r.on('error',()=>process.exit(1));r.setTimeout(2000,()=>{r.destroy();process.exit(1)})
      timeout: 3s
      interval: 10s
      retries: 20
      start_period: 5s
    image: local/telco-mi-demo-backend:1.0.0
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8080
        published: "18082"
        protocol: tcp
  subscriber-crm:
    build:
      context: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment/services/mi-demo-backends
      dockerfile: Dockerfile
    container_name: telco-subscriber-crm
    environment:
      CRM_LEGACY_KEY: crm-demo-key
      PORT: "8080"
      SERVICE_KIND: crm
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - const http=require('http');const r=http.get('http://127.0.0.1:8080/health',res=>{res.resume();process.exit(res.statusCode===200?0:1)});r.on('error',()=>process.exit(1));r.setTimeout(2000,()=>{r.destroy();process.exit(1)})
      timeout: 3s
      interval: 10s
      retries: 20
      start_period: 5s
    image: local/telco-mi-demo-backend:1.0.0
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8080
        published: "18081"
        protocol: tcp
  telco-backend:
    build:
      context: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment/services/telco-backend
      dockerfile: Dockerfile
    container_name: telco-backend
    depends_on:
      opa:
        condition: service_started
        required: true
      redpanda:
        condition: service_started
        required: true
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_CLIENT_ID: telco-demo-backend
      KAFKA_ENABLED: "true"
      KAFKA_GROUP_ID: telco-demo-portal-group
      OPA_ENABLED: "true"
      OPA_URL: http://opa:8181
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8081
        published: "8081"
        protocol: tcp
    volumes:
      - type: bind
        source: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment/artifacts
        target: /workspace/artifacts
        read_only: true
        bind: {}
  telco-backend-observer:
    build:
      context: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment/observability/backend-observer
      dockerfile: Dockerfile
    container_name: telco-backend-observer
    depends_on:
      telco-observability:
        condition: service_healthy
        required: true
    environment:
      BACKEND_TIMEOUT_MS: "3500"
      BILLING_TARGET: http://legacy-billing-primary:8080
      CIRCUIT_TIMEOUT_MS: "4500"
      CRM_TARGET: http://subscriber-crm:8080
      DEVICE_LOCATION_TARGET: http://device-location-service:8080
      OSS_TARGET: http://oss-network-service:8080
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      SIM_SWAP_TARGET: http://sim-swap-service:8080
      TELEMETRY_URL: http://telco-observability:8088/v1/events
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://127.0.0.1:8090/health
      timeout: 3s
      interval: 10s
      retries: 20
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8090
        published: "8091"
        protocol: tcp
  telco-gateway-observer:
    build:
      context: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment/observability/gateway-observer
      dockerfile: Dockerfile
    container_name: telco-gateway-observer
    depends_on:
      telco-observability:
        condition: service_healthy
        required: true
      wso2-apim:
        condition: service_started
        required: true
    environment:
      GATEWAY_TARGET: https://wso2-apim:8243
      GATEWAY_VHOST: localhost
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      TELEMETRY_URL: http://telco-observability:8088/v1/events
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://127.0.0.1:8089/health
      timeout: 3s
      interval: 10s
      retries: 20
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8089
        published: "8288"
        protocol: tcp
  telco-observability:
    build:
      context: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment/observability/telemetry-service
      dockerfile: Dockerfile
    container_name: telco-observability
    depends_on:
      otel-collector:
        condition: service_started
        required: true
      redpanda:
        condition: service_started
        required: true
    environment:
      DATA_DIR: /data
      KAFKA_BROKERS: redpanda:9092
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://127.0.0.1:8088/health
      timeout: 3s
      interval: 10s
      retries: 30
    networks:
      default:
        aliases:
          - telco-observability-backup
    ports:
      - mode: ingress
        target: 8088
        published: "8088"
        protocol: tcp
    volumes:
      - type: volume
        source: telco-observability-data
        target: /data
        volume: {}
  telco-traffic-generator:
    build:
      context: /Users/joaoluiskuntz/wso2mi/Projects/Demo/demo-apim-telco-environment/observability/traffic-generator
      dockerfile: Dockerfile
    container_name: telco-traffic-generator
