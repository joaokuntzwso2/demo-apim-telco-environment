name: Telco REST Commercial Guardrails
description: Demo REST API governance rules for commercial telco APIs.
rulesetType: API_DEFINITION
artifactType: REST_API
documentationLink: https://example.com/telco-api-governance
formats:
  - oas2
  - oas3

rules:
  telco-no-api-key-auth:
    description: APIs exposed as commercial products must not rely on API key authentication. Use OAuth2 or OpenID Connect instead.
    message: Commercial APIs must not define API key security schemes.
    severity: error
    given:
      - "$.components.securitySchemes[*]"
      - "$.securityDefinitions[*]"
    then:
      field: type
      function: pattern
      functionOptions:
        notMatch: "^apiKey$"

  telco-operation-id-required:
    description: Every operation must have a stable operationId so APIOps, SDK generation, and governance reports can map runtime behavior to a contract.
    message: Operation is missing operationId.
    severity: error
    given:
      - "$.paths[*][get,post,put,patch,delete]"
    then:
      field: operationId
      function: truthy

  telco-429-response-required:
    description: Commercial APIs must document throttling behavior because subscribers select plans with quotas.
    message: Operation must document HTTP 429 response for quota/rate-limit handling.
    severity: warn
    given:
      - "$.paths[*][get,post,put,patch,delete].responses"
    then:
      field: "429"
      function: truthy

  telco-context-extension-required:
    description: Imported OpenAPI contracts should include x-wso2-basePath to make gateway context explicit.
    message: x-wso2-basePath is required at the root of the OpenAPI contract.
    severity: warn
    given:
      - "$"
    then:
      field: x-wso2-basePath
      function: truthy
