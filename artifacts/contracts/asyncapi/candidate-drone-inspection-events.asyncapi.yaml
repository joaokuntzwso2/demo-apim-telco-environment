asyncapi: 3.0.0
info:
  title: CandidateDroneInspectionEventsAPI
  version: 0.9.0
  description: Candidate Server-Sent Events API for drone inspection events.
servers:
  production:
    host: telco-backend:8081
    protocol: http
channels:
  droneInspections:
    address: /events/drone-inspections
    messages:
      DroneInspectionEvent:
        $ref: '#/components/messages/DroneInspectionEvent'
operations:
  receiveDroneInspectionEvents:
    action: receive
    channel:
      $ref: '#/channels/droneInspections'
    messages:
      - $ref: '#/channels/droneInspections/messages/DroneInspectionEvent'
x-telco-owner: Field Operations
x-telco-country-scope:
  - BR
x-telco-event-classification: OPERATIONAL
x-telco-event-retention: 14
x-telco-monetization-model: EVENT_STREAM
components:
  messages:
    DroneInspectionEvent:
      name: DroneInspectionEvent
      title: Drone inspection event
      contentType: application/json
      payload:
        type: object
        required:
          - eventId
          - towerId
          - inspectionStatus
          - severity
          - timestamp
        properties:
          eventId:
            type: string
          towerId:
            type: string
          inspectionStatus:
            type: string
            enum:
              - COMPLETED
              - ATTENTION_REQUIRED
              - MAINTENANCE_DISPATCHED
          severity:
            type: string
            enum:
              - INFO
              - WARNING
              - CRITICAL
          timestamp:
            type: string
            format: date-time
