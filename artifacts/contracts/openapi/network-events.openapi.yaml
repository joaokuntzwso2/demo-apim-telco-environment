openapi: 3.0.3
info:
  title: NetworkEventsStreamAPI-HTTPFacade
  version: 1.0.0
  description: HTTP/SSE/WebHook façade contract for the network events streaming capability. The canonical streaming contract is also provided as AsyncAPI.
servers:
  - url: http://telco-backend:8081
x-wso2-basePath: /network-events/v1
x-wso2-production-endpoints:
  urls:
    - http://telco-backend:8081
x-wso2-sandbox-endpoints:
  urls:
    - http://telco-backend:8081
x-wso2-throttling-tier: 50kPerMin
x-telco-owner: Network Assurance
x-telco-country-scope: [MX, BR, CO, AR, CL, PE]
x-telco-data-classification: Internal-Network-Operational
x-telco-monetization-model: Billable event stream in Network Premium plan
x-telco-api-product: Network Monetization Pack
x-telco-backend-protocol: SSE/WebSocket/WebHook
x-telco-supplemental-contract: contracts/asyncapi/network-events.asyncapi.yaml
x-telco-healthcheck:
  method: GET
  path: /health
security:
  - OAuth2: [network.events.read]
tags:
  - name: SSE Stream
  - name: WebHook Receiver
  - name: Event History
paths:
  /events/network-events:
    get:
      tags: [SSE Stream]
      operationId: subscribeNetworkEventsSse
      summary: Subscribe to network events using Server-Sent Events
      responses:
        '200':
          description: Network events SSE stream
          content:
            text/event-stream:
              schema:
                type: string
  /webhooks/network-events:
    post:
      tags: [WebHook Receiver]
      operationId: receiveNetworkEventWebhook
      summary: Receive network event callbacks through WebHook delivery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NetworkEvent'
      responses:
        '202':
          description: Event accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  received: { type: boolean }
                  timestamp: { type: string, format: date-time }
                  callbackCorrelationId: { type: string }
  /api/v1/usage/events:
    get:
      tags: [Event History]
      operationId: listRecentUsageEvents
      summary: Retrieve recent mock events for analytics replay or demo reset
      parameters:
        - name: count
          in: query
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: Events returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/NetworkEvent'
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://identity.telco.example/oauth2/token
          scopes:
            network.events.read: Read network events
  schemas:
    NetworkEvent:
      type: object
      properties:
        id: { type: string }
        timestamp: { type: string, format: date-time }
        eventType: { type: string }
        severity: { type: string }
        country: { type: string }
        region: { type: string }
        cellId: { type: string }
        sliceId: { type: string }
        latencyMs: { type: integer }
        utilizationPct: { type: integer }
        partnerId: { type: string }
        monetizationImpactUsd: { type: number }
