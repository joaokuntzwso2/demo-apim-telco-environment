{
  "openapi": "3.0.3",
  "info": {
    "title": "Billing Adjustment Modernization API",
    "version": "1.0.0",
    "description": "Managed REST/JSON facade backed by WSO2 Integrator: MI. It validates a canonical billing-adjustment request, transforms it to the legacy SOAP/XML contract with WS-Security UsernameToken, uses failover/circuit-breaking for the legacy BSS endpoints, and normalizes the SOAP response or fault back to JSON.",
    "contact": {
      "name": "Telco API Platform Team",
      "email": "telco-api-platform@example.com",
      "url": "https://wso2.com/"
    },
    "license": {
      "name": "Proprietary demo contract"
    }
  },
  "servers": [
    {
      "url": "http://wso2-mi:8290/billing-adjustments/v1"
    }
  ],
  "x-wso2-basePath": "/billing-adjustments/v1",
  "x-telco-health-path": "/health",
  "x-telco-health-method": "GET",
  "x-telco-api-product": "Legacy BSS Modernization Pack",
  "x-telco-architecture-layer": "enterprise-integration",
  "tags": [
    {
      "name": "Billing Adjustments",
      "description": "Modern REST facade for the legacy SOAP billing system."
    }
  ],
  "paths": {
    "/health": {
      "get": {
        "tags": [
          "Billing Adjustments"
        ],
        "operationId": "getBillingAdjustmentModernizationHealth",
        "summary": "Check the billing modernization integration service",
        "description": "Confirms that the WSO2 MI REST-to-SOAP facade is deployed.",
        "responses": {
          "200": {
            "description": "Runtime is available",
            "headers": {
              "X-Correlation-ID": {
                "schema": {
                  "type": "string"
                }
              }
            },
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Health"
                }
              }
            }
          }
        }
      }
    },
    "/adjustments": {
      "post": {
        "tags": [
          "Billing Adjustments"
        ],
        "operationId": "createBillingAdjustment",
        "summary": "Create a billing adjustment through the legacy BSS",
        "description": "Accepts canonical JSON, transforms it to a SOAP 1.1 request with WS-Security, invokes the failover legacy billing service, and returns a normalized JSON response.",
        "parameters": [
          {
            "name": "X-Correlation-ID",
            "in": "header",
            "required": false,
            "description": "Existing correlation identifier. WSO2 MI creates one when omitted.",
            "schema": {
              "type": "string",
              "maxLength": 128
            }
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/BillingAdjustmentRequest"
              },
              "examples": {
                "roamingCredit": {
                  "value": {
                    "transactionId": "BILL-ADJ-2026-0001",
                    "subscriberId": "+525512340001",
                    "amount": 12.4,
                    "currency": "USD",
                    "reasonCode": "ROAMING_CREDIT",
                    "requestedBy": "care-agent-778"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Billing adjustment completed or replayed idempotently",
            "headers": {
              "X-Correlation-ID": {
                "schema": {
                  "type": "string"
                }
              }
            },
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/BillingAdjustmentResponse"
                }
              }
            }
          },
          "400": {
            "description": "Invalid billing adjustment request",
            "content": {
              "application/problem+json": {
                "schema": {
                  "$ref": "#/components/schemas/Problem"
                }
              }
            }
          },
          "502": {
            "description": "Legacy SOAP service returned a normalized SOAP fault",
            "content": {
              "application/problem+json": {
                "schema": {
                  "$ref": "#/components/schemas/Problem"
                }
              }
            }
          },
          "503": {
            "description": "All legacy billing endpoints are unavailable",
            "content": {
              "application/problem+json": {
                "schema": {
                  "$ref": "#/components/schemas/Problem"
                }
              }
            }
          }
        }
      }
    }
  },
  "components": {
    "schemas": {
      "BillingAdjustmentRequest": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "transactionId",
          "subscriberId",
          "amount",
          "currency",
          "reasonCode",
          "requestedBy"
        ],
        "properties": {
          "transactionId": {
            "type": "string",
            "minLength": 1,
            "maxLength": 128
          },
          "subscriberId": {
            "type": "string",
            "minLength": 1,
            "maxLength": 64
          },
          "amount": {
            "type": "number",
            "format": "double",
            "exclusiveMinimum": 0
          },
          "currency": {
            "type": "string",
            "pattern": "^[A-Z]{3}$"
          },
          "reasonCode": {
            "type": "string",
            "minLength": 1,
            "maxLength": 64
          },
          "requestedBy": {
            "type": "string",
            "minLength": 1,
            "maxLength": 128
          }
        }
      },
      "BillingAdjustmentResponse": {
        "type": "object",
        "required": [
          "transactionId",
          "adjustmentId",
          "status",
          "subscriberId",
          "amount",
          "currency",
          "previousBalance",
          "newBalance",
          "backendNode",
          "idempotentReplay",
          "correlationId"
        ],
        "properties": {
          "transactionId": {
            "type": "string"
          },
          "adjustmentId": {
            "type": "string"
          },
          "status": {
            "type": "string"
          },
          "subscriberId": {
            "type": "string"
          },
          "amount": {
            "type": "number",
            "format": "double"
          },
          "currency": {
            "type": "string"
          },
          "previousBalance": {
            "type": "number",
            "format": "double"
          },
          "newBalance": {
            "type": "number",
            "format": "double"
          },
          "backendNode": {
            "type": "string"
          },
          "processedAt": {
            "type": "string",
            "format": "date-time"
          },
          "idempotentReplay": {
            "type": "boolean"
          },
          "correlationId": {
            "type": "string"
          }
        }
      },
      "Health": {
        "type": "object",
        "properties": {
          "status": {
            "type": "string",
            "example": "UP"
          },
          "service": {
            "type": "string",
            "example": "BillingAdjustmentModernizationAPI"
          },
          "runtime": {
            "type": "string"
          },
          "pattern": {
            "type": "string"
          },
          "correlationId": {
            "type": "string"
          }
        }
      },
      "Problem": {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "format": "uri"
          },
          "title": {
            "type": "string"
          },
          "status": {
            "type": "integer"
          },
          "code": {
            "type": "string"
          },
          "detail": {
            "type": "string"
          },
          "correlationId": {
            "type": "string"
          }
        }
      }
    }
  }
}
